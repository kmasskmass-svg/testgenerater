<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منسق الاختبارات الذكي | أ.كليب الزهراني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- مكتبات معالجة الملفات -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #10b981;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        #exam-paper {
            background-color: white;
            min-height: 297mm;
            width: 210mm;
            margin: 0 auto;
            padding: 15mm 10mm; /* تم تقليل الهوامش الجانبية لزيادة عرض الورقة */
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        @media print {
            @page { size: A4; margin: 10mm; } 
            body { background: white !important; margin: 0; padding: 0; }
            .no-print, header, #controlPanel, #toolbar { display: none !important; }
            #previewArea { display: block !important; width: 100% !important; margin: 0 !important; }
            .bg-slate-300 { 
                background: transparent !important; 
                padding: 0 !important; 
                display: block !important; 
                overflow: visible !important; 
                min-height: auto !important;
            }
            #exam-paper { box-shadow: none !important; margin: 0 !important; width: 100% !important; padding: 0 !important; display: block !important; }
        }

        .glass-card { background: rgba(255, 255, 255, 0.98); border: 1px solid #e2e8f0; }
        .section-title { position: relative; padding-right: 12px; }
        .section-title::after { content: ''; position: absolute; right: 0; top: 15%; height: 70%; width: 4px; background: var(--primary); border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6 custom-scrollbar">

<div class="max-w-7xl mx-auto">
    <!-- Header Area -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 no-print">
        <div class="flex items-center gap-4">
            <div class="bg-blue-900 text-white p-3 rounded-2xl shadow-lg">
                <i class="fa-solid fa-file-pen text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold text-blue-950 tracking-tight">منسق الاختبارات الجاهزة</h1>
                <p class="text-blue-700 text-sm font-bold">إعداد: أ.كليب بن أحمد الزهراني</p>
            </div>
        </div>
        <div class="bg-white px-4 py-2 rounded-xl border border-blue-100 flex items-center gap-3">
            <button onclick="document.getElementById('libraryModal').classList.remove('hidden'); loadLibraryUI();" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg border border-indigo-100 flex items-center gap-2 hover:bg-indigo-100 transition-all">
                <i class="fa-solid fa-book-bookmark"></i> <span class="text-xs font-bold">مكتبتي (حفظ محلي)</span>
            </button>
        </div>
    </header>

    <div id="mainContainer">
        <!-- Control Panel (الشاشة الأولى) -->
        <div id="controlPanel" class="max-w-4xl mx-auto space-y-6 no-print transition-all duration-500">
            
            <div class="glass-card p-5 rounded-2xl shadow-sm space-y-4">
                <h2 class="font-bold text-slate-700 flex items-center gap-2 section-title">
                    <i class="fa-solid fa-paste text-blue-600"></i> أسئلة الاختبار
                </h2>
                <div id="dropZone" class="border-2 border-dashed border-blue-200 rounded-xl p-4 text-center cursor-pointer hover:bg-blue-50 transition-all">
                    <i class="fa-solid fa-file-word text-2xl text-blue-300 mb-1"></i>
                    <p class="text-[11px] font-medium text-slate-600">رفع ملف Word أو PDF أو TXT</p>
                    <input type="file" id="fileInput" accept=".pdf,.docx,.txt" class="hidden">
                </div>
                <textarea id="textContent" rows="18" class="w-full p-5 text-sm bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 resize-y leading-loose" placeholder="الصق أسئلتك هنا... &#10;&#10;💡 أفضل صيغة ليفهمها النظام ويقوم بترتيبها:&#10;السؤال الأول: اختر الإجابة الصحيحة&#10;1- ما هي عاصمة السعودية؟&#10;أ- الرياض   ب- جدة   ج- مكة   د- الدمام&#10;&#10;2- كم عدد القارات؟&#10;أ- 5&#10;ب- 6&#10;ج- 7"></textarea>
                <div id="uploadStatus" class="text-xs text-center hidden"></div>
            </div>

            <div class="glass-card p-5 rounded-2xl shadow-sm space-y-4">
                <button id="toggleHeaderBtn" class="w-full flex justify-between items-center text-slate-700 font-bold text-sm">
                    <span class="flex items-center gap-2 section-title">إعدادات الترويسة والشعار</span>
                    <i class="fa-solid fa-chevron-down text-[10px]"></i>
                </button>
                <div id="headerSettings" class="space-y-3 pt-2">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="hR1" placeholder="المملكة العربية السعودية" class="p-2 text-xs bg-slate-50 border rounded-lg">
                        <input type="text" id="hL1" placeholder="المادة: ..........." class="p-2 text-xs bg-slate-50 border rounded-lg">
                        <input type="text" id="hR2" placeholder="وزارة التعليم" class="p-2 text-xs bg-slate-50 border rounded-lg">
                        <input type="text" id="hL2" placeholder="الصف: ..........." class="p-2 text-xs bg-slate-50 border rounded-lg">
                        <input type="text" id="hEduDept" placeholder="إدارة التعليم" value="إدارة تعليم ..............." class="p-2 text-xs bg-slate-50 border rounded-lg">
                        <input type="text" id="hSchool" placeholder="المدرسة" value="مدرسة: ......................." class="p-2 text-xs bg-slate-50 border rounded-lg">
                        <input type="text" id="hTime" placeholder="الزمن" value="الزمن: ..........." class="p-2 text-xs bg-slate-50 border rounded-lg">
                        <input type="text" id="hDate" placeholder="التاريخ" value="التاريخ: ..... / ..... / 144 هـ" class="p-2 text-xs bg-slate-50 border rounded-lg">
                    </div>
                    <input type="text" id="examTitle" placeholder="اختبار الفصل الدراسي ..." class="w-full p-2 text-xs font-bold text-center bg-blue-50 border border-blue-100 rounded-lg">
                    
                    <div class="grid grid-cols-3 gap-2 border-t pt-3 mt-1 border-slate-100">
                        <input type="text" id="hStudentName" value="اسم المتدرب: ...................................................." placeholder="اسم المتدرب" class="p-2 text-[10px] bg-slate-50 border rounded-lg">
                        <input type="text" id="hAcademicNum" value="الرقم الأكاديمي: ......................." placeholder="الرقم الأكاديمي" class="p-2 text-[10px] bg-slate-50 border rounded-lg">
                        <input type="text" id="hSection" value="الشعبة: .........." placeholder="الشعبة" class="p-2 text-[10px] bg-slate-50 border rounded-lg">
                    </div>

                    <div class="p-2 border rounded-xl bg-slate-50 text-center flex flex-col items-center gap-2">
                        <img id="logoPreviewImg" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Ministry_of_Education_Saudi_Arabia.svg/200px-Ministry_of_Education_Saudi_Arabia.svg.png" class="h-10 object-contain" alt="الشعار">
                        <input type="file" id="logoInput" accept="image/*" class="hidden">
                        <div class="flex gap-3">
                            <button onclick="document.getElementById('logoInput').click()" class="text-[11px] font-bold text-blue-600 underline">تغيير الشعار</button>
                            <button id="resetLogo" class="text-[10px] text-red-500 hover:underline">استعادة الافتراضي</button>
                        </div>
                    </div>
                </div>
            </div>

            <button id="generateBtn" class="w-full bg-blue-900 hover:bg-blue-950 text-white font-bold py-4 rounded-2xl shadow-xl flex justify-center items-center gap-3 transition-all text-lg">
                <i class="fa-solid fa-layer-group"></i>
                <span>تنسيق وترتيب ورقة الاختبار</span>
            </button>
        </div>

        <!-- Preview Area (الشاشة الثانية للمعاينة) -->
        <div id="previewArea" class="hidden max-w-5xl mx-auto flex-col transition-all duration-500 w-full">
            <div id="toolbar" class="glass-card p-4 rounded-2xl mb-5 flex justify-between items-center no-print flex-wrap gap-4">
                <div class="flex items-center gap-3">
                    <button onclick="goBackToEdit()" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-200 transition-colors flex items-center gap-2 shadow-sm">
                        <i class="fa-solid fa-arrow-right"></i> عودة للتعديل
                    </button>
                    <span class="text-sm font-bold text-slate-600 border-r-2 border-slate-200 pr-3">معاينة الورقة</span>
                </div>
                <div class="flex gap-2">
                    <button id="saveLibBtn" onclick="saveToLibrary()" class="bg-emerald-50 text-emerald-600 px-3 py-2 rounded-xl text-xs font-bold border border-emerald-100 hover:bg-emerald-100"><i class="fa-solid fa-bookmark"></i> حفظ محلي</button>
                    <button onclick="exportPDF()" class="bg-rose-50 text-rose-600 px-3 py-2 rounded-xl text-xs font-bold border border-rose-100 hover:bg-rose-100"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                    <button onclick="exportWord()" class="bg-blue-50 text-blue-600 px-3 py-2 rounded-xl text-xs font-bold border border-blue-100 hover:bg-blue-100"><i class="fa-solid fa-file-word"></i> Word</button>
                </div>
            </div>

            <div class="bg-slate-300 p-4 rounded-3xl flex-1 flex justify-center overflow-auto shadow-inner min-h-[800px]">
                <div id="exam-paper" class="hidden">
                    <div id="paper-content"></div>
                </div>
                <div id="placeholder" class="flex flex-col items-center justify-center text-slate-400 py-32 text-center">
                    <i class="fa-solid fa-file-lines text-8xl opacity-10 mb-6"></i>
                    <h3 class="text-lg font-bold text-slate-500">الورقة جاهزة للتنسيق</h3>
                    <p class="text-xs mt-2">قم بلصق الأسئلة واضغط على "تنسيق وترتيب"</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal التنبيهات -->
<div id="alertModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl text-center">
        <h4 id="modalTitle" class="text-lg font-bold mb-2"></h4>
        <div id="modalMsg" class="text-slate-500 text-sm mb-6 break-words"></div>
        <button onclick="closeModal()" class="w-full py-3 bg-blue-900 text-white font-bold rounded-xl">موافق</button>
    </div>
</div>

<!-- Modal المكتبة -->
<div id="libraryModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl max-w-2xl w-full max-h-[80vh] flex flex-col shadow-2xl overflow-hidden">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-indigo-50">
            <h3 class="font-bold text-indigo-900 flex items-center gap-2"><i class="fa-solid fa-book-bookmark text-indigo-600"></i> مكتبتي (محفوظة في المتصفح)</h3>
            <button onclick="document.getElementById('libraryModal').classList.add('hidden')" class="text-slate-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div id="libraryContent" class="p-5 flex-1 overflow-y-auto space-y-3 custom-scrollbar bg-slate-50">
            <!-- سيتم تحميل المحتوى المحفوظ هنا -->
        </div>
    </div>
</div>

<script>
    const DEFAULT_LOGO = "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Ministry_of_Education_Saudi_Arabia.svg/200px-Ministry_of_Education_Saudi_Arabia.svg.png";
    let logoBase64 = DEFAULT_LOGO;
    let currentRawText = "";

    function initPdfJs() { 
        if (typeof window['pdfjs-dist/build/pdf'] !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js'; 
        }
    }
    window.onload = initPdfJs;

    // Toggle Header Settings
    document.getElementById('toggleHeaderBtn').addEventListener('click', () => {
        document.getElementById('headerSettings').classList.toggle('hidden');
    });
    
    // File Upload Handlers
    document.getElementById('dropZone').addEventListener('click', () => document.getElementById('fileInput').click());
    
    document.getElementById('logoInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => { logoBase64 = ev.target.result; document.getElementById('logoPreviewImg').src = logoBase64; if(currentRawText) renderExam(); };
        reader.readAsDataURL(file);
    });
    
    document.getElementById('resetLogo').addEventListener('click', () => {
        logoBase64 = DEFAULT_LOGO;
        document.getElementById('logoPreviewImg').src = logoBase64;
        if(currentRawText) renderExam();
    });

    document.getElementById('fileInput').addEventListener('change', async e => {
        const file = e.target.files[0];
        if(!file) return;
        const status = document.getElementById('uploadStatus');
        status.className = "text-xs text-center text-blue-600 mt-2 block";
        status.innerHTML = 'جاري القراءة...';
        try {
            let text = "";
            const fileName = file.name.toLowerCase();
            if (fileName.endsWith('.pdf')) {
                const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(it => it.str).join(' ') + '\n';
                }
            } else if (fileName.endsWith('.docx')) {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                text = res.value;
            } else if (fileName.endsWith('.txt')) { text = await file.text(); }
            document.getElementById('textContent').value = text;
            status.innerText = "✓ تم التحميل واللصق";
            setTimeout(() => status.classList.add('hidden'), 3000);
        } catch (err) { 
            status.className = "text-xs text-center text-red-600 mt-2 block";
            status.innerText = "✗ حدث خطأ في قراءة الملف"; 
        }
    });

    // Generate/Format Action
    document.getElementById('generateBtn').addEventListener('click', () => {
        const content = document.getElementById('textContent').value.trim();
        if(!content) { 
            showModal("تنبيه", "يرجى لصق الأسئلة أو كتابتها أولاً في المربع المخصص."); 
            return; 
        }
        
        currentRawText = content;
        renderExam();
        
        // إخفاء الشاشة الأولى وإظهار الشاشة الثانية
        document.getElementById('controlPanel').classList.add('hidden');
        document.getElementById('previewArea').classList.remove('hidden');
        document.getElementById('previewArea').classList.add('flex');
        
        document.getElementById('placeholder').classList.add('hidden');
        document.getElementById('exam-paper').classList.remove('hidden');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // زر العودة
    window.goBackToEdit = function() {
        document.getElementById('previewArea').classList.add('hidden');
        document.getElementById('previewArea').classList.remove('flex');
        document.getElementById('controlPanel').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // الدالة الذكية لتنسيق الأسئلة
    function renderExam() {
        if(!currentRawText) return;
        
        const v = id => document.getElementById(id).value;
        const fixRTL = (s) => '&#x200F;' + (s||'').trim().replace(/ /g, '&nbsp;') + '&#x200F;';
        const vf = id => fixRTL(v(id));

        let formattedText = '';
        let questionCounter = 1;
        let lines = currentRawText.split('\n');
        
        lines.forEach(line => {
            let tLine = line.trim();
            if (!tLine) return;

            // الحفاظ على المسافات بدقة للخيارات المتلاصقة لمنع اختفائها
            let safeLine = line.replace(/\t/g, '&nbsp;&nbsp;&nbsp;&nbsp;').replace(/  +/g, '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;');

            // حل جذري لمشكلة انعكاس الشرطة (-) في الـ PDF بفصل الشرطة برمجياً عن الحرف
            safeLine = safeLine.replace(/^([أبجد])\s*[-]/, '<span style="display:inline-block;">$1</span><span style="display:inline-block; margin-right:3px; margin-left:3px;">-</span>');

            // 1. هل هو عنوان رئيسي؟ (يحتوي على كلمات دلالية معينة)
            let isHeader = tLine.includes('السؤال الأول') || tLine.includes('السؤال الثاني') || tLine.includes('السؤال الثالث') || tLine.includes('السؤال الرابع') || tLine.includes('السؤال الخامس') || tLine.includes('أولاً') || tLine.includes('ثانياً') || tLine.includes('اختر الإجابة') || tLine.includes('ضع علامة') || tLine.includes('أكمل الفراغ') || tLine.includes('زاوج') || tLine.includes('صل بين');

            // 2. هل هو سؤال؟ (يبدأ برقم متبوع بشرطة أو قوس، أو يبدأ بكلمة س1، أو ينتهي بعلامة استفهام)
            let qRegex = /^((س\s*\d+)|(\d+\s*[\-\.\)]))/;
            let isQuestion = qRegex.test(tLine) || tLine.endsWith('؟') || tLine.endsWith('?');

            // عملية البناء والتنسيق
            if (isHeader) {
                // تصفير العداد إذا كان القسم هو السؤال الأول أو أولاً
                if (tLine.includes('السؤال الأول') || tLine.includes('أولاً')) {
                    questionCounter = 1;
                }
                formattedText += `<div style="background-color: #f1f5f9; border-right: 4px solid #1e3a8a; padding: 10px 15px; margin-top: 30px; margin-bottom: 20px; font-weight: bold; font-size: 16px; color: #0f172a; border-radius: 4px; page-break-inside: avoid;">${safeLine}</div>`;
            } 
            else if (isQuestion) {
                // مسح الترقيم العشوائي القديم الذي وضعه المستخدم (إن وجد) لتوحيد الترقيم
                let cleanQ = tLine.replace(qRegex, '').trim();
                if (cleanQ.startsWith('-') || cleanQ.startsWith('.')) cleanQ = cleanQ.substring(1).trim();
                
                // رسم الخط الفاصل، وكتابة السؤال بلون وترقيم جديدين (مع فصل الرقم عن الشرطة لمنع الانقلاب بالـ PDF)
                formattedText += `
                    <div style="border-top: 1px dashed #cbd5e1; margin-top: 20px; padding-top: 15px; page-break-inside: avoid;">
                        <b style="color: #1e3a8a; font-size: 16px; display: block; margin-bottom: 8px;">
                            <span style="display:inline-block;">${questionCounter}</span><span style="display:inline-block; margin-right:4px; margin-left:4px;">-</span> ${cleanQ || safeLine}
                        </b>
                    </div>`;
                questionCounter++;
            } 
            else {
                // إذا لم يكن عنواناً ولا سؤالاً، فهو بالتأكيد (نص أو خيارات أ ب ج د) تابعة للسؤال
                formattedText += `<div style="padding-right: 25px; margin-bottom: 5px; color: #334155; page-break-inside: avoid;">${safeLine}</div>`;
            }
        });

        let html = `
        <table style="width: 100%; border-bottom: 2px solid #1e3a8a; margin-bottom: 20px; direction: rtl; border-collapse: collapse;">
            <tr>
                <td style="width:33%; text-align:center; vertical-align:top; font-size:13px; line-height:1.6;">${vf('hR1')}<br>${vf('hR2')}<br>${vf('hEduDept')}<br>${vf('hSchool')}</td>
                <td style="width:34%; text-align:center; vertical-align:top;">
                    <img src="${logoBase64}" style="height:110px; max-width:100%; object-fit:contain; margin: 0 auto;">
                    <div style="margin-top: 10px;"><b>${v('examTitle')}</b></div>
                </td>
                <td style="width:33%; text-align:left; vertical-align:top; font-size:13px; line-height:1.6;"><div style="display:inline-block; text-align:right;">${vf('hL1')}<br>${vf('hL2')}<br>${vf('hTime')}<br>${vf('hDate')}</div></td>
            </tr>
        </table>
        
        <!-- قسم بيانات الطالب بعد توسعته وإعادة ترتيبه وإزاحة الدائرة لليمين -->
        <div style="border:1px solid #000; padding:15px 20px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; direction:rtl; font-size: 15px; font-weight: bold;">
            <div style="flex: 1; display: flex; justify-content: space-between; align-items: center;">
                <div style="flex: 2; text-align: right;">${vf('hStudentName')}</div>
                <div style="flex: 1.5; text-align: center;">${vf('hAcademicNum')}</div>
                <div style="flex: 1; text-align: left;">${vf('hSection')}</div>
            </div>
            <!-- دائرة الدرجة مقسومة بخط أفقي (مزاحة لليمين 45 بيكسل) -->
            <div style="border:1px solid #000; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink: 0; background-color: #fff; margin-left: 45px;">
                <div style="width: 30px; border-top: 1.5px solid #000;"></div>
            </div>
        </div>
        
        <div style="direction:rtl; text-align:right; font-size:15px; line-height:2.0; font-family:'Tajawal', sans-serif;">
            ${formattedText}
        </div>
        `;

        document.getElementById('paper-content').innerHTML = html;
    }

    // ميزة الحفظ المحلي (Local Storage)
    window.saveToLibrary = function() {
        if(!currentRawText) return;
        const title = document.getElementById('examTitle').value || 'اختبار بدون عنوان';
        const newExam = {
            id: Date.now().toString(),
            title: title,
            text: currentRawText,
            logo: logoBase64,
            date: new Date().toLocaleDateString('ar-SA')
        };
        
        let library = JSON.parse(localStorage.getItem('myExamsLibrary') || '[]');
        library.push(newExam);
        localStorage.setItem('myExamsLibrary', JSON.stringify(library));
        
        showModal("نجاح", "تم حفظ الاختبار في متصفحك بنجاح. يمكنك استعادته لاحقاً من زر مكتبتي.");
    };

    window.loadLibraryUI = function() {
        const container = document.getElementById('libraryContent');
        let library = JSON.parse(localStorage.getItem('myExamsLibrary') || '[]');
        
        if (library.length === 0) {
            container.innerHTML = '<div class="text-center py-10 text-slate-400 text-sm">المكتبة فارغة حالياً. قم بحفظ اختباراتك أولاً.</div>';
            return;
        }
        
        library.sort((a, b) => b.id - a.id);
        container.innerHTML = library.map(exam => `
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center hover:border-indigo-300 transition-colors">
                <div>
                    <h4 class="font-bold text-slate-800 text-sm mb-1">${exam.title}</h4>
                    <span class="text-[10px] text-slate-400">${exam.date}</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="loadFromLibrary('${exam.id}')" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold">استرجاع</button>
                    <button onclick="deleteFromLibrary('${exam.id}')" class="bg-rose-50 text-rose-600 px-3 py-1.5 rounded-lg text-xs"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>`).join('');
    };

    window.loadFromLibrary = function(id) {
        let library = JSON.parse(localStorage.getItem('myExamsLibrary') || '[]');
        const exam = library.find(e => e.id === id);
        if(exam) {
            document.getElementById('textContent').value = exam.text;
            currentRawText = exam.text;
            if(exam.logo) logoBase64 = exam.logo;
            document.getElementById('examTitle').value = exam.title;
            
            renderExam();
            
            document.getElementById('libraryModal').classList.add('hidden');
            
            document.getElementById('controlPanel').classList.add('hidden');
            document.getElementById('previewArea').classList.remove('hidden');
            document.getElementById('previewArea').classList.add('flex');
            
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('exam-paper').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };

    window.deleteFromLibrary = function(id) {
        let library = JSON.parse(localStorage.getItem('myExamsLibrary') || '[]');
        library = library.filter(e => e.id !== id);
        localStorage.setItem('myExamsLibrary', JSON.stringify(library));
        loadLibraryUI(); 
    };

    // التصدير
    window.exportPDF = function() { 
        const element = document.getElementById('exam-paper');
        const opt = {
            margin:       0,
            filename:     'exam.pdf',
            image:        { type: 'jpeg', quality: 1.0 },
            html2canvas:  { scale: 2, backgroundColor: '#ffffff' },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save(); 
    };
    
    window.exportWord = function() { 
        const blob = new Blob(['\ufeff', document.getElementById("exam-paper").innerHTML], {type:'application/msword'});
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "exam.doc"; link.click();
    };
    
    window.showModal = function(title, msg) { 
        document.getElementById('modalTitle').innerText = title; 
        document.getElementById('modalMsg').innerText = msg; 
        document.getElementById('alertModal').classList.remove('hidden'); 
    };
    window.closeModal = function() { document.getElementById('alertModal').classList.add('hidden'); };
</script>
</body>
</html>
